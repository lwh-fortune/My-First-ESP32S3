[env:esp32-s3-devkitc-1]
platform = espressif32@6.7.0
board = my_esp32s3_n16r8
framework = arduino
monitor_speed = 115200
upload_speed = 921600

# ====== 硬件配置（针对 N16R8）=======
board_build.flash_mode = qio           ; Flash 模式
board_build.flash_size = 16MB          ; 16MB Flash
board_build.psram_type = opi           ; Octal PSRAM（N16R8 通常为 OPI PSRAM）
board_build.boot = qio                 ; 启动模式
board_build.partitions = my_16MB_spiffs.csv

# ====== 文件系统 ======
board_build.filesystem = spiffs

# ====== 库依赖 ======
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
    knolleary/PubSubClient
    bblanchon/ArduinoJson @ ^7.0.0
    mathertel/OneButton @ ^2.0.3
    madhephaestus/ESP32Servo @ ^1.1.1
    arduino-libraries/NTPClient @ ^3.2.1

# ====== 编译选项 ======
build_flags = 
    -Wno-deprecated-declarations
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM                  ; 告知框架启用 PSRAM
    -mfix-esp32-psram-cache-issue      ; 修复某些 S3 版本的 PSRAM 缓存问题